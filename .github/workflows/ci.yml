name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: forge
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d forge"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    strategy:
      fail-fast: false
      matrix:
        toolchain:
          - 1.94.1
          - stable
    env:
      FORGE_TEST_POSTGRES_URL: postgres://postgres:postgres@127.0.0.1:5432/forge

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.toolchain }}

      - name: Verify
        run: make verify
