name: Release Readiness

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  verify-release:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: foundry
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d foundry"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      FOUNDRY_TEST_POSTGRES_URL: postgres://postgres:postgres@127.0.0.1:5432/foundry

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Release verification
        run: make verify-release

      - name: Capture clean build metrics
        run: make build-metrics | tee build-metrics.md

      - name: Upload build metrics
        uses: actions/upload-artifact@v4
        with:
          name: foundry-build-metrics
          path: build-metrics.md
